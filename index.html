<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학교 방탈출: 원자의 공포</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --horror-red: #8b0000;
            --dark-space: #050507;
            --neon-blue: #00f2ff;
        }
        body {
            background-color: var(--dark-space);
            color: #eee;
            font-family: 'Noto Sans KR', sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto;
        }
        .myeongjo { font-family: 'Nanum Myeongjo', serif; }

        .bg-overlay {
            position: fixed;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0.3;
            transition: all 1.5s ease;
            z-index: -1;
            filter: grayscale(40%) contrast(110%);
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }
        .glitch-active { animation: glitch 0.15s infinite; filter: hue-rotate(45deg); }

        .glass-panel {
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
        }

        .option-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .option-item:hover {
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--neon-blue);
        }

        .horror-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.05);
            font-size: 0.85rem;
        }
        @media (min-width: 640px) { .horror-table { font-size: 1rem; } }
        .horror-table th, .horror-table td {
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px;
            text-align: center;
        }
        .horror-table th { color: var(--neon-blue); }

        .dead-screen {
            position: fixed;
            inset: 0;
            background: black;
            z-index: 500;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--horror-red);
            padding: 20px;
        }

        #story-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 50;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            text-align: center;
            overflow-y: auto;
        }

        .power-btn {
            background: radial-gradient(circle, #ff0000 0%, #330000 100%);
            box-shadow: 0 0 20px #ff0000;
            transition: all 0.3s;
        }
        .power-btn:hover { transform: scale(1.1); box-shadow: 0 0 40px #ff0000; }

        .kina-glow {
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.8));
        }
        
        .atom-container svg {
            max-width: 100%;
            height: auto;
        }

        #report-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 300;
            padding: 1rem;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div id="bg-layer" class="bg-overlay"></div>
    <div id="horror-filter" class="fixed inset-0 pointer-events-none z-50 mix-blend-multiply opacity-0 transition-opacity duration-500" style="background: radial-gradient(circle, transparent 20%, black 100%);"></div>

    <!-- Start Screen -->
    <div id="start-screen" class="fixed inset-0 flex flex-col items-center justify-center p-6 text-center z-[100] bg-black transition-opacity duration-1000 overflow-y-auto">
        <div class="max-w-2xl w-full py-8">
            <p class="text-red-700 tracking-[0.4em] sm:tracking-[0.8em] mb-2 text-xs sm:text-sm font-bold opacity-60">SAMNAM MIDDLE SCHOOL</p>
            <h1 class="myeongjo text-3xl sm:text-5xl mb-6 sm:mb-8 tracking-[0.2em] sm:tracking-[0.3em] text-red-900 animate-pulse">삼남중학교: 깨어난 원자</h1>
            <p class="text-base sm:text-xl leading-loose mb-8 sm:mb-12 myeongjo opacity-70 whitespace-pre-line px-2">
                심야 자율학습 중 깜빡 잠이 들었다.
                정신을 차려보니 삼남중학교 교실 안은 칠흑 같은 어둠뿐이다.
                
                뒷문은 쇠사슬로 감겨 있고, 
                교탁 앞 전자칠판이 기괴한 소리를 내며 흔들리기 시작한다...
            </p>
            <div class="flex flex-col items-center gap-4">
                <div class="w-16 h-16 sm:w-20 sm:h-20 rounded-full power-btn cursor-pointer flex items-center justify-center" onclick="powerOn()">
                    <svg width="32" height="32" class="sm:w-[40px] sm:h-[40px]" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                        <path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path>
                        <line x1="12" y1="2" x2="12" y2="12"></line>
                    </svg>
                </div>
                <p class="text-xs sm:text-sm text-red-800 tracking-widest mt-4 font-bold uppercase">Activate Monitor to Begin</p>
            </div>
        </div>
    </div>

    <!-- Story Step Overlay -->
    <div id="story-overlay" class="myeongjo">
        <div class="max-w-3xl w-full py-10">
            <p id="story-location" class="text-red-700 tracking-[0.3em] sm:tracking-[0.5em] mb-4 text-xs sm:text-sm font-bold"></p>
            <h2 id="story-title" class="text-2xl sm:text-3xl mb-8 sm:mb-10 text-white border-b border-white/10 pb-6"></h2>
            <p id="story-description" class="text-lg sm:text-2xl leading-relaxed text-blue-100/90 mb-12 sm:mb-16 whitespace-pre-line px-2"></p>
            <button onclick="startStageQuestion()" class="border-2 border-blue-500/50 text-blue-400 px-8 sm:px-12 py-3 sm:py-4 hover:bg-blue-500 hover:text-white transition-all tracking-[0.3em] uppercase text-base sm:text-lg">
                조사하기
            </button>
        </div>
    </div>

    <!-- Main Game UI -->
    <div id="game-ui" class="relative z-10 flex flex-col items-center justify-start min-h-screen w-full p-4 hidden">
        <div class="w-full max-w-4xl flex justify-between items-end mb-4 px-2 mt-4">
            <div class="flex-1">
                <p id="ui-location" class="text-blue-500 font-bold tracking-widest text-[10px] sm:text-xs mb-1 uppercase"></p>
                <h1 id="ui-stage" class="myeongjo text-base sm:text-xl text-white/50 truncate"></h1>
            </div>
            <div id="game-timer" class="text-xl sm:text-3xl font-mono text-white opacity-20 ml-4">00:00</div>
        </div>

        <div id="main-card" class="glass-panel w-full max-w-4xl rounded-2xl p-6 sm:p-10 shadow-2xl transition-all duration-500 mb-8">
            <h2 id="question-text" class="text-xl sm:text-3xl myeongjo leading-snug mb-6 sm:mb-10 text-white"></h2>
            <div id="visual-content" class="mb-6 sm:mb-10 flex justify-center atom-container"></div>
            <div id="options-container" class="grid grid-cols-1 md:grid-cols-2 gap-3 sm:gap-5"></div>
        </div>

        <div class="mt-auto pb-8 opacity-20 text-[8px] sm:text-[10px] tracking-[0.3em] sm:tracking-[0.5em] uppercase text-center w-full">
            <span id="progress-text"></span>
        </div>
    </div>

    <!-- Transition/Cutscene Overlay -->
    <div id="cutscene" class="fixed inset-0 bg-black z-[200] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-1000 overflow-y-auto">
        <div class="text-center p-8 max-w-2xl w-full">
            <p id="cutscene-msg" class="text-xl sm:text-3xl myeongjo leading-relaxed text-white mb-12 sm:mb-16"></p>
            <button id="cutscene-next-btn" class="bg-white text-black px-10 sm:px-16 py-3 sm:py-4 hover:bg-red-700 hover:text-white transition-all font-bold tracking-widest text-sm sm:text-base">다음 구역으로</button>
        </div>
    </div>

    <!-- Dead Screen -->
    <div id="dead-screen" class="dead-screen">
        <h1 class="text-6xl sm:text-[12rem] font-black mb-8 myeongjo tracking-tighter opacity-20 sm:absolute sm:top-1/2 sm:left-1/2 sm:-translate-x-1/2 sm:-translate-y-1/2 text-center">망각</h1>
        <div class="relative z-10 text-center w-full">
            <p id="death-reason" class="text-lg sm:text-2xl mb-10 sm:mb-16 tracking-widest myeongjo uppercase"></p>
            <div class="flex flex-col sm:flex-row gap-4 sm:gap-8 justify-center items-center">
                <button onclick="retryCurrentStage()" class="w-full sm:w-auto bg-red-900 text-white px-10 sm:px-12 py-3 sm:py-4 hover:scale-105 transition-all font-bold">다시 시도</button>
                <button onclick="location.reload()" class="w-full sm:w-auto border border-white/20 text-white/40 px-10 sm:px-12 py-3 sm:py-4 hover:text-white transition-all">처음으로</button>
            </div>
        </div>
    </div>

    <!-- Report Modal -->
    <div id="report-modal">
        <div class="glass-panel w-full max-w-lg rounded-3xl p-8 shadow-2xl relative">
            <button onclick="document.getElementById('report-modal').style.display='none'" class="absolute top-4 right-6 text-2xl opacity-50 hover:opacity-100">&times;</button>
            <h2 class="myeongjo text-2xl text-blue-400 mb-6 border-b border-white/10 pb-4">나의 탈출 리포트</h2>
            <div id="report-list" class="space-y-4 max-h-[60vh] overflow-y-auto pr-2">
                <!-- 리포트 항목이 여기에 추가됨 -->
            </div>
            <button onclick="document.getElementById('report-modal').style.display='none'" class="w-full mt-8 py-3 bg-blue-600 rounded-xl font-bold">닫기</button>
        </div>
    </div>

    <script>
        function getAtomSVG(electrons, isComplex = false) {
            const nuclearColor = "#ff3333"; 
            const neutronColor = "#555555"; 
            const electronColor = varColor('--neon-blue');
            const baseSize = 250;
            
            if(isComplex) {
                return `
                <div class="flex flex-col items-center">
                    <svg width="${baseSize}" height="${baseSize}" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="38" fill="none" stroke="white" stroke-opacity="0.2" stroke-width="0.8" stroke-dasharray="2 1" />
                        <g transform="translate(42, 42)">
                            <circle cx="4" cy="4" r="5.5" fill="${neutronColor}" stroke="rgba(255,255,255,0.2)" stroke-width="0.5" />
                            <circle cx="8" cy="11" r="5.5" fill="${neutronColor}" stroke="rgba(255,255,255,0.2)" stroke-width="0.5" />
                            <circle cx="12" cy="4" r="5.5" fill="${nuclearColor}" stroke="black" stroke-width="0.5" />
                            <text x="12" y="6" fill="white" font-size="7" font-weight="black" text-anchor="middle">+</text>
                        </g>
                        <circle cx="50" cy="12" r="4.5" fill="${electronColor}" filter="drop-shadow(0 0 4px ${electronColor})" />
                        <text x="50" y="14.5" fill="black" font-size="7" font-weight="black" text-anchor="middle">-</text>
                        <text x="50" y="7" fill="${electronColor}" font-size="8" font-weight="bold" text-anchor="middle">A</text>
                        <text x="68" y="45" fill="white" font-size="8" font-weight="bold" text-anchor="middle">B</text>
                        <text x="68" y="65" fill="white" font-size="8" font-weight="bold" text-anchor="middle">C</text>
                        <path d="M 50 16 L 50 25" stroke="white" stroke-width="1" opacity="0.4" />
                        <path d="M 62 48 L 54 44" stroke="white" stroke-width="1" opacity="0.4" />
                        <path d="M 62 62 L 54 58" stroke="white" stroke-width="1" opacity="0.4" />
                    </svg>
                    <div class="text-[10px] sm:text-[11px] text-blue-400 font-bold tracking-widest mt-2 uppercase">Subatomic Scan Complete</div>
                </div>`;
            }
            
            let svg = `<svg width="${baseSize * 0.7}" height="${baseSize * 0.7}" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="10" fill="${nuclearColor}" filter="drop-shadow(0 0 5px ${nuclearColor})" />
                <text x="50" y="53" fill="white" font-size="8" font-weight="black" text-anchor="middle">+</text>
                <circle cx="50" cy="50" r="24" fill="none" stroke="white" stroke-opacity="0.3" stroke-width="1" />
                ${electrons > 2 ? '<circle cx="50" cy="50" r="40" fill="none" stroke="white" stroke-opacity="0.3" stroke-width="1" />' : ''}`;
            
            for(let i=0; i<electrons; i++) {
                const r = i < 2 ? 24 : 40;
                const angle = i < 2 ? i*180 : (i-2)*(360/(electrons-2));
                const cx = 50 + r * Math.cos(angle * Math.PI / 180);
                const cy = 50 + r * Math.sin(angle * Math.PI / 180);
                svg += `
                    <circle cx="${cx}" cy="${cy}" r="4" fill="${electronColor}" filter="drop-shadow(0 0 4px ${electronColor})" />
                    <text x="${cx}" y="${cy+2.5}" fill="black" font-size="6" font-weight="black" text-anchor="middle">-</text>
                `;
            }
            svg += `</svg>`;
            return svg;
        }

        function varColor(name) {
            const val = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
            return val || "#00f2ff";
        }

        const stages = [
            {
                loc: "제1교실 (본관 3층)",
                bg: "https://images.unsplash.com/photo-1580582932707-520aed937b7b?q=80&w=2000",
                title: "Stage 1: 깨어난 전자칠판",
                description: "삼남중학교의 밤은 낮보다 훨씬 무겁습니다.\n전자칠판에서 시작된 핏빛 노이즈가 당신을 압박합니다.\n원자의 기본 구조를 모른다면 교실의 쇠사슬은 풀리지 않을 것입니다.",
                question: "원자와 그 구성 입자에 대한 설명으로 옳은 것은?",
                visual: "",
                options: ["원자핵은 (-) 전하를 띤다.", "원자는 전기적으로 중성이다.", "원자는 양성자와 전자로만 이루어져 있다.", "전자는 원자 질량의 대부분을 차지한다."],
                answer: 1,
                story: "칠판이 꺼지며 쇠사슬이 힘없이 바닥으로 떨어집니다. 복도로 나가는 문이 열렸습니다."
            },
            {
                loc: "중앙 복도",
                bg: "https://images.unsplash.com/photo-1516382799247-87df95d790b7?q=80&w=2000",
                title: "Stage 2: 사물함의 비밀번호",
                description: "복도를 가로질러 뛰어가던 중, 한 사물함이 격렬하게 진동합니다.\n사물함 문에는 입자의 수를 나타내는 기괴한 표가 새겨져 있습니다.\n이 비밀번호를 맞춰야만 계단실의 잠금이 해제됩니다.",
                question: "(가), (나), (다)에 들어갈 숫자의 합은 얼마입니까?",
                visual: `
                    <table class="horror-table myeongjo">
                        <tr><th>구분</th><th>리튬</th><th>탄소</th><th>마그네슘</th></tr>
                        <tr><td>양성자수</td><td>(가)</td><td>6</td><td>12</td></tr>
                        <tr><td>전자수</td><td>3</td><td>(나)</td><td>(다)</td></tr>
                    </table>
                `,
                options: ["15", "18", "21", "24"],
                answer: 2,
                story: "사물함이 열리며 기나쌤의 목소리가 담긴 듯한 낡은 무전기가 나옵니다. 계단으로 달려갑니다!"
            },
            {
                loc: "중앙 계단실",
                bg: "https://images.unsplash.com/photo-1505672678657-cc7037095e60?q=80&w=2000",
                title: "Stage 3: 벽에 그려진 환영",
                description: "계단 벽면을 가득 채운 낙서들이 꿈틀거리며 눈동자로 변합니다.\n당신을 감시하는 눈동자들 사이에서 '산소'의 형상을 찾아내십시오.\n틀린 선택은 영원한 추락을 의미합니다.",
                question: "다음 (가)~(라) 중 '산소(O)' 원자 모형은 무엇입니까?",
                visual: `
                    <div class="flex justify-around bg-black/60 p-4 sm:p-6 rounded-2xl flex-wrap gap-4 sm:gap-8 border border-white/5 shadow-2xl">
                        <div class="text-center"><div class="mb-2 text-white/30 text-xs">(가)</div>${getAtomSVG(1)}</div>
                        <div class="text-center"><div class="mb-2 text-white/30 text-xs">(나)</div>${getAtomSVG(3)}</div>
                        <div class="text-center"><div class="mb-2 text-white/30 text-xs">(다)</div>${getAtomSVG(8)}</div>
                        <div class="text-center"><div class="mb-2 text-white/30 text-xs">(라)</div>${getAtomSVG(6)}</div>
                    </div>
                `,
                options: ["(가) 모형", "(나) 모형", "(다) 모형", "(라) 모형"],
                answer: 2,
                story: "계단을 뛰어내려가 1층 중앙 현관에 도달했습니다. 이제 외부 셔터만이 남았습니다."
            },
            {
                loc: "중앙 현관: 스캐너",
                bg: "https://images.unsplash.com/photo-1497366754035-f200968a6e72?q=80&w=2000",
                title: "Stage 4: 보안 시스템 해제",
                description: "현관 스캐너가 당신의 얼굴을 붉은 레이저로 훑습니다.\n화면에는 원자 내부의 정밀한 구조가 나타납니다.\n입자의 각 부위 명칭을 정확히 식별해야 셔터가 올라갑니다.",
                question: "그림에서 A, B, C의 이름을 옳게 짝지은 것은?",
                visual: getAtomSVG(0, true),
                options: [
                    "A:원자핵, B:전자, C:양성자",
                    "A:전자, B:양성자, C:중성자",
                    "A:양성자, B:중성자, C:원자핵",
                    "A:전자, B:중성자, C:양성자"
                ],
                answer: 1,
                story: "셔터가 요란한 소리를 내며 올라갑니다. 차가운 새벽 공기가 느껴지기 시작합니다."
            },
            {
                loc: "현관 정문",
                bg: "https://images.unsplash.com/photo-1519337265831-281ec6cc8514?q=80&w=2000",
                title: "Stage 5: 마지막 인증",
                description: "현관문을 열기 직전, 마지막 질문이 머릿속을 울립니다.\n이 질문에 답하지 못하면 학교는 당신을 다시 교실로 끌고 갈 것입니다.\n원자의 성질을 명확히 증명하십시오.",
                question: "원자에 대한 설명으로 옳지 않은 것은?",
                visual: "",
                options: [
                    "원자는 전기적으로 중성이다.",
                    "원자핵은 원자 중심에 위치한다.",
                    "중심에는 (+)전하를 띠는 전자가 있다.",
                    "종류에 따라 원자핵의 전하량이 다르다."
                ],
                answer: 2,
                story: "정문 빗장이 풀립니다! 이제 교문만 지나면 탈출할 수 있습니다."
            },
            {
                loc: "삼남중학교 정문",
                bg: "https://images.unsplash.com/photo-1464618663641-bbdd760ae84a?q=80&w=2000",
                title: "Final Stage: 운명의 갈림길",
                description: "안개가 자욱한 교문 앞, 두 개의 원자 형상이 길을 막습니다.\n저 멀리 교문 밖에서 기나쌤의 간절한 목소리가 들려옵니다.\n마지막 답을 맞추고 선생님에게 달려가십시오!",
                question: "두 원자 (가)와 (나) 모형에 대한 설명으로 옳은 것은?",
                visual: `
                    <div class="flex justify-center gap-6 sm:gap-16 flex-wrap bg-white/5 p-4 sm:p-8 rounded-3xl border border-blue-500/10">
                        <div class="text-center"><div class="mb-2 text-blue-400 font-bold text-xs">(가)</div>${getAtomSVG(2)}</div>
                        <div class="text-center"><div class="mb-2 text-blue-400 font-bold text-xs">(나)</div>${getAtomSVG(5)}</div>
                    </div>
                `,
                options: [
                    "원자 번호는 (가)가 더 크다.",
                    "전자 수는 (나)가 (가)보다 많다.",
                    "(가)와 (나)는 같은 종류의 원자이다.",
                    "원자핵의 (+)전하량은 (가)가 더 크다."
                ],
                answer: 1,
                story: "교문이 활짝 열립니다! 당신은 온 힘을 다해 밖으로 뛰어 나갑니다."
            }
        ];

        let currentStage = 0;
        let timer = 0;
        let timerInterval;
        // 각 단계별 시도 횟수 기록용 배열
        let attemptData = stages.map(() => 0);

        function powerOn() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                initGame();
            }, 1000);
        }

        function initGame() {
            currentStage = 0;
            attemptData = stages.map(() => 0); // 기록 초기화
            showStoryStep();
            if(!timerInterval) {
                timerInterval = setInterval(() => {
                    timer++;
                    const m = Math.floor(timer/60).toString().padStart(2,'0');
                    const s = (timer%60).toString().padStart(2,'0');
                    document.getElementById('game-timer').innerText = `${m}:${s}`;
                }, 1000);
            }
        }

        function showStoryStep() {
            const data = stages[currentStage];
            const storyOverlay = document.getElementById('story-overlay');
            const gameUI = document.getElementById('game-ui');
            
            gameUI.classList.add('hidden');
            storyOverlay.style.display = 'flex';
            
            document.getElementById('bg-layer').style.backgroundImage = `url('${data.bg}')`;
            document.getElementById('story-location').innerText = data.loc;
            document.getElementById('story-title').innerText = data.title;
            document.getElementById('story-description').innerText = data.description;
            
            storyOverlay.scrollTop = 0;
        }

        function startStageQuestion() {
            document.getElementById('story-overlay').style.display = 'none';
            document.getElementById('game-ui').classList.remove('hidden');
            renderStage();
        }

        function renderStage() {
            const data = stages[currentStage];
            const card = document.getElementById('main-card');
            
            card.classList.remove('glitch-active');
            document.getElementById('horror-filter').style.opacity = '0';

            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                document.getElementById('ui-location').innerText = data.loc;
                document.getElementById('ui-stage').innerText = data.title;
                document.getElementById('question-text').innerText = data.question;
                document.getElementById('visual-content').innerHTML = data.visual;
                document.getElementById('progress-text').innerText = `${currentStage + 1} / ${stages.length} STAGES COMPLETED`;

                const container = document.getElementById('options-container');
                container.innerHTML = '';
                data.options.forEach((opt, idx) => {
                    const div = document.createElement('div');
                    div.className = 'option-item p-4 sm:p-6 rounded-xl myeongjo flex items-center text-sm sm:text-lg';
                    div.innerHTML = `<span class="text-blue-500 font-bold mr-4 sm:mr-6 text-base sm:text-xl">${idx+1}</span> ${opt}`;
                    div.onclick = () => checkAnswer(idx);
                    container.appendChild(div);
                });

                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 300);
        }

        function checkAnswer(idx) {
            const data = stages[currentStage];
            attemptData[currentStage]++; // 시도 횟수 증가
            
            if (idx === data.answer) {
                showCutscene(data.story);
            } else {
                triggerDeath();
            }
        }

        function triggerDeath() {
            const card = document.getElementById('main-card');
            const filter = document.getElementById('horror-filter');
            card.classList.add('glitch-active');
            filter.style.opacity = '1';
            
            setTimeout(() => {
                document.getElementById('dead-screen').style.display = 'flex';
                document.getElementById('death-reason').innerText = "TRUTH REMAINS HIDDEN IN DARKNESS";
            }, 600);
        }

        function retryCurrentStage() {
            document.getElementById('dead-screen').style.display = 'none';
            startStageQuestion(); 
        }

        function showCutscene(msg) {
            const cut = document.getElementById('cutscene');
            document.getElementById('cutscene-msg').innerText = msg;
            cut.classList.remove('pointer-events-none');
            cut.classList.add('opacity-100');
            document.getElementById('cutscene-next-btn').onclick = nextStage;
        }

        function nextStage() {
            currentStage++;
            const cut = document.getElementById('cutscene');
            cut.classList.add('pointer-events-none');
            cut.classList.remove('opacity-100');
            
            if (currentStage < stages.length) {
                showStoryStep();
            } else {
                winGame();
            }
        }

        function showReport() {
            const list = document.getElementById('report-list');
            list.innerHTML = '';
            
            stages.forEach((stage, idx) => {
                const attempts = attemptData[idx];
                const item = document.createElement('div');
                item.className = 'bg-white/5 p-4 rounded-2xl border border-white/10 flex justify-between items-center';
                item.innerHTML = `
                    <div>
                        <div class="text-[10px] text-blue-400 uppercase tracking-widest mb-1">${stage.loc}</div>
                        <div class="text-sm sm:text-base font-bold">${stage.title.split(': ')[1]}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-[10px] opacity-40 uppercase">Attempts</div>
                        <div class="text-xl font-mono ${attempts === 1 ? 'text-green-400' : 'text-red-400'}">${attempts}</div>
                    </div>
                `;
                list.appendChild(item);
            });
            
            document.getElementById('report-modal').style.display = 'flex';
        }

        function winGame() {
            clearInterval(timerInterval);
            document.body.innerHTML = `
                <div class="flex flex-col items-center justify-center min-h-screen text-center bg-sky-50 text-black p-6 relative overflow-y-auto overflow-x-hidden">
                    <div class="absolute inset-0 opacity-10 bg-[radial-gradient(circle,rgba(255,255,255,1)_0%,rgba(0,123,255,0.2)_100%)] animate-pulse"></div>
                    <div class="relative z-10 max-w-2xl w-full py-10">
                        <div class="mb-8 text-5xl sm:text-7xl kina-glow">👩‍🏫</div>
                        <h1 class="myeongjo text-4xl sm:text-7xl mb-4 sm:mb-6 font-bold tracking-tighter text-blue-900">삼남중학교 탈출 성공</h1>
                        <p class="text-lg sm:text-2xl mb-6 sm:mb-8 leading-relaxed font-bold">
                            "정말 다행이야! 얼마나 걱정했다구!"
                        </p>
                        <p class="text-base sm:text-xl mb-10 sm:mb-12 opacity-80 leading-loose myeongjo px-2">
                            교문을 나서자마자 마음을 졸이며 기다리던 <span class="text-blue-600 font-bold">기나쌤</span>이 당신을 반겨줍니다.<br>
                            선생님의 따뜻한 미소가 어두웠던 학교의 기억을 모두 씻어내 줍니다.
                        </p>
                        <div class="bg-white/50 backdrop-blur-sm p-6 sm:p-8 rounded-2xl shadow-xl mb-8 inline-block">
                            <div class="text-[10px] opacity-40 mb-2 uppercase tracking-[0.2em]">Total Rescue Time</div>
                            <div class="text-4xl sm:text-6xl font-mono font-bold text-blue-950">${document.getElementById('game-timer').innerText}</div>
                        </div>
                        
                        <div class="flex flex-col gap-4 max-w-sm mx-auto">
                            <button onclick="showReport()" class="bg-white border-2 border-blue-600 text-blue-600 px-8 py-4 font-bold tracking-widest text-lg hover:bg-blue-50 transition-all rounded-2xl shadow-lg">나의 탈출 기록 보기</button>
                            <button onclick="location.reload()" class="bg-blue-600 text-white px-8 py-4 font-bold tracking-widest text-lg hover:bg-blue-800 transition-all rounded-2xl shadow-xl">다시 도전하기</button>
                        </div>
                    </div>
                </div>
                <div id="report-modal">
                    <div class="glass-panel w-full max-w-lg rounded-3xl p-8 shadow-2xl relative text-white text-left">
                        <button onclick="document.getElementById('report-modal').style.display='none'" class="absolute top-4 right-6 text-2xl opacity-50 hover:opacity-100">&times;</button>
                        <h2 class="myeongjo text-2xl text-blue-400 mb-6 border-b border-white/10 pb-4">나의 탈출 리포트</h2>
                        <div id="report-list" class="space-y-4 max-h-[50vh] overflow-y-auto pr-2"></div>
                        <button onclick="document.getElementById('report-modal').style.display='none'" class="w-full mt-8 py-3 bg-blue-600 rounded-xl font-bold">닫기</button>
                    </div>
                </div>
            `;
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
